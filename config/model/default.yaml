# @package _global_.model

# Default model configuration
name: "bert-base-uncased"
num_labels: 2

# Kronecker approximation settings
kronecker:
  enabled: true
  max_candidate: 32
  als_iter: 5
  strategy: "classifier"
  factorization_objective: "balanced"
  tile_multiple: 16
  min_factor_size: 16
  implementation: "gemm"
  target_modules: []

# LoRA adaptation settings
lora:
  enabled: true
  rank: 8
  alpha: 32
